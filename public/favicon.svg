<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    MediGuide.health — Guide Cross favicon v2
    Teal M with large-radius rounded arm tops, deep V-notch,
    large medical cross, and wide perspective road.
  -->

  <!-- M body: connected bucket, large 20px arcs at outer arm tops, V-notch to y=50 -->
  <path
    fill="#5BA99A"
    d="M 18,91
       Q 10,91 10,83
       L 10,29
       A 20,20 0 0 1 30,9
       L 34,9
       L 50,50
       L 66,9
       L 70,9
       A 20,20 0 0 1 90,29
       L 90,83
       Q 90,91 82,91
       Z"
  />

  <!-- White medical cross — vertical arm top flush with V-notch bottom (y=50) -->
  <!-- Horizontal bar -->
  <rect x="39" y="56" width="22" height="8" rx="2" fill="white"/>
  <!-- Vertical bar -->
  <rect x="46" y="50" width="8" height="20" rx="2" fill="white"/>

  <!-- White perspective road — wide S-curve fill, narrow at top, wide at bottom -->
  <path
    fill="white"
    d="M 44,73
       C 52,78 22,84 20,91
       L 65,91
       C 66,85 68,79 56,73
       Z"
  />
</svg>
